---
layout: default
---

<main class="flex-1 md:ml-64 lg:ml-72 p-8 md:p-16 lg:p-24 max-w-4xl">
    
    <section id="home" class="min-h-[40vh] flex flex-col justify-center mb-10">
        <p id="greeting" class="text-xl md:text-2xl text-gray-500 dark:text-gray-400 font-medium mb-4 h-8 transition-opacity duration-500">"We regret to inform you..."</p>
        <h1 class="text-4xl md:text-5xl lg:text-6xl font-bold tracking-tight leading-tight">
            Welcome to <br>
            <span class="bg-gradient-to-r from-red-600 to-orange-500 text-transparent bg-clip-text">International Journal of Rejections</span>, a final resting place for rejected studies.
        </h1>
    </section>

    <hr class="border-gray-200 dark:border-gray-800 mb-20">

    <section id="aims" class="mb-24">
        <h3 class="text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">Manifesto</h3>
        <h2 class="text-3xl font-bold mb-6">Aim and scope</h2>
    </section>

    <section id="editorial" class="mb-24">
        <h3 class="text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">Governance</h3>
        <h2 class="text-3xl font-bold mb-6">Editorial board</h2>
    </section>

    <section id="guide" class="mb-24">
        <h3 class="text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">Instructions</h3>
        <h2 class="text-3xl font-bold mb-6">Guide for authors</h2>
    </section>

    <section id="submit" class="mb-24">
        <h3 class="text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">Action</h3>
        <h2 class="text-3xl font-bold mb-6">Submit your article</h2>
    </section>

</main>
