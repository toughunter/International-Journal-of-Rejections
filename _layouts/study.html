---
layout: default
---

<main class="flex-1 md:ml-64 lg:ml-72 p-8 md:p-16 lg:p-24 max-w-5xl">
    <a href="{{ '/vol2-rs.html' | relative_url }}" class="inline-flex items-center text-sm font-semibold text-gray-500 hover:text-journal-600 mb-8 transition-colors">
        &larr; Back to Volume 2
    </a>

    <header class="mb-12">
        <p class="text-xs text-gray-500 dark:text-gray-400 uppercase tracking-widest font-semibold mb-2">Published {{ page.date | date: "%B %d, %Y" }}</p>
        <h1 class="text-3xl md:text-4xl font-bold leading-tight mb-6">{{ page.title }}</h1>
    </header>

    <div class="mb-16">
        <h3 class="text-2xl font-bold mb-6">Original Manuscript</h3>
        <div class="w-full bg-gray-100 dark:bg-gray-800 rounded overflow-hidden shadow-inner" style="height: 800px;">
            <iframe id="pdf-viewer" width="100%" height="100%" style="border: none;"></iframe>
        </div>
    </div>

    <div class="border-t border-gray-200 dark:border-gray-800 pt-12">
        <h3 class="text-2xl font-bold mb-8">The Verdict & The Defense</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-800 p-6 rounded">
                <h3 class="text-xs font-bold uppercase tracking-widest text-gray-400 mb-4">Reviewer Comments</h3>
                <div class="prose dark:prose-invert prose-sm max-w-none text-gray-700 dark:text-gray-300">
                    {{ page.reviewer_comments | markdownify }}
                </div>
            </div>

            <div class="bg-red-50 dark:bg-red-900/10 border border-red-100 dark:border-red-900/30 p-6 rounded">
                <h3 class="text-xs font-bold uppercase tracking-widest text-red-800 dark:text-red-400 mb-4">Author's Unfiltered Rebuttal</h3>
                <div class="prose dark:prose-invert prose-sm max-w-none text-red-900 dark:text-red-200">
                    {{ page.rebuttal | markdownify }}
                </div>
            </div>
        </div>
    </div>
</main>

<script>
    const originalLink = "{{ page.gdrive_link }}";
    const pdfContainer = document.getElementById('pdf-viewer');
    
    if (originalLink && originalLink.trim() !== "") {
        const previewLink = originalLink.replace(/\/view.*$/, "/preview");
        pdfContainer.src = previewLink;
    } else {
        pdfContainer.outerHTML = "<div class='flex items-center justify-center h-full text-gray-500'>No manuscript PDF provided.</div>";
    }
</script>
